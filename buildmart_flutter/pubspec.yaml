name: buildmart
description: BuildMart — India's Construction Super-App. Hyderabad First.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.3

  # State Management
  flutter_riverpod: ^2.6.1

  # Supabase
  supabase_flutter: ^2.8.4

  # Images
  cached_network_image: ^3.4.1

  # Local Storage
  shared_preferences: ^2.3.5

  # Animations
  animations: ^2.0.11

  # UI Utilities
  shimmer: ^3.0.0

  # Formatting / i18n
  intl: ^0.20.2

  # URL Launcher
  url_launcher: ^6.3.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
