name: Release — Build & Deploy to Play Store

on:
  push:
    tags:
      - 'v*.*.*'   # Trigger on version tags like v1.0.0

jobs:
  build-android:
    name: Build Android Release AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: 'stable'

      - name: Install dependencies
        working-directory: buildmart_flutter
        run: flutter pub get

      - name: Run Flutter analyze
        working-directory: buildmart_flutter
        run: flutter analyze

      - name: Run tests
        working-directory: buildmart_flutter
        run: flutter test

      # Decode keystore from GitHub secret
      - name: Decode keystore
        run: |
          echo "${{ secrets.BUILDMART_KEYSTORE_BASE64 }}" | base64 --decode > buildmart_flutter/android/app/buildmart-release.jks

      - name: Build release AAB
        working-directory: buildmart_flutter
        env:
          BUILDMART_KEY_STORE_PATH: android/app/buildmart-release.jks
          BUILDMART_KEY_ALIAS: ${{ secrets.BUILDMART_KEY_ALIAS }}
          BUILDMART_STORE_PASSWORD: ${{ secrets.BUILDMART_STORE_PASSWORD }}
          BUILDMART_KEY_PASSWORD: ${{ secrets.BUILDMART_KEY_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: buildmart-release-aab
          path: buildmart_flutter/build/app/outputs/bundle/release/app-release.aab

      # Optional: deploy to Play Store internal track
      # Requires google-play-developer-api.json stored as secret
      # - name: Deploy to Play Store (internal track)
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
      #     packageName: com.buildmart.buildmart
      #     releaseFiles: buildmart_flutter/build/app/outputs/bundle/release/app-release.aab
      #     track: internal
      #     status: draft

